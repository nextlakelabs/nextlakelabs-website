<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | NextLakeLabs</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg-alt);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .login-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            z-index: 0;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--color-bg);
            padding: 3rem 2.5rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--color-border);
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .login-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--color-text-light);
            font-size: 0.95rem;
        }

        .login-form .form-group {
            margin-bottom: 1.5rem;
        }

        .login-form label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-heading);
        }

        .login-form input {
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            background: var(--color-bg-alt);
            font-family: inherit;
            transition: all var(--transition);
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--color-primary);
            background: var(--color-bg);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .login-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            font-weight: 700;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--color-text-light);
            text-decoration: none;
            transition: color var(--transition);
        }

        .back-home:hover {
            color: var(--color-primary);
        }

        .error-message {
            background: #fee2e2;
            color: #ef4444;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-bg"></div>
        
        <div class="login-card">
            <div class="login-header">
                <a href="index.html" class="login-logo">
                    <span class="logo-icon">
                        <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
                            <defs>
                                <linearGradient id="logoGradLogin" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#4f46e5"/>
                                    <stop offset="100%" style="stop-color:#7c3aed"/>
                                </linearGradient>
                            </defs>
                            <rect width="100" height="100" rx="20" fill="url(#logoGradLogin)"/>
                            <path d="M50 25 L70 50 L50 75 L30 50 Z" fill="white" opacity="0.9"/>
                        </svg>
                    </span>
                    <span class="logo-text">NextLake<span class="logo-highlight">Labs</span></span>
                </a>
                <h1>Admin Portal</h1>
                <p>Sign in to manage your website content</p>
            </div>

            <div id="loginError" class="error-message"></div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="admin@nextlakelabs.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn">
                    Sign In
                </button>
            </form>

            <a href="index.html" class="back-home">← Back to main website</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
